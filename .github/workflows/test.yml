name: Test

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  jest:
    name: Jest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: yarn
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
      - run: yarn install --frozen-lockfile
      - run: yarn test
