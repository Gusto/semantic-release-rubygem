name: Test

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  jest:
    name: Jest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: "20"
          cache: yarn
      - uses: ruby/setup-ruby@v1.305.0
        with:
          ruby-version: "3.3"
      - run: yarn install --frozen-lockfile
      - run: yarn test
